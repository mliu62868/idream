<svg viewBox="0 0 720 460" xmlns="http://www.w3.org/2000/svg" fill="none" aria-label="Defense in depth: five moderation layers stacked. Input, Output, Metadata and behaviour, Human reviewers, Community reports.">
  <style>
    .label { font-family: Inter, ui-sans-serif, system-ui, sans-serif; font-size: 18px; font-weight: 600; fill: #0d0d0d; }
    .sub { font-family: Inter, ui-sans-serif, system-ui, sans-serif; font-size: 13px; font-weight: 400; fill: #555555; }
    .title { font-family: Inter, ui-sans-serif, system-ui, sans-serif; font-size: 14px; font-weight: 500; fill: #555555; letter-spacing: 0.08em; text-transform: uppercase; }
  </style>
  <text x="60" y="36" class="title">Defense in depth</text>
  <g transform="translate(60, 60)">
    <g>
      <rect x="0" y="0" width="600" height="62" rx="10" fill="#FD5FC2" fill-opacity="0.10" stroke="#FD5FC2" stroke-opacity="0.65" stroke-width="1.5"/>
      <text x="22" y="38" class="label">1. Input</text>
      <text x="578" y="38" text-anchor="end" class="sub">Prompt classification</text>
    </g>
    <g transform="translate(0, 78)">
      <rect x="0" y="0" width="600" height="62" rx="10" fill="#FD5FC2" fill-opacity="0.10" stroke="#FD5FC2" stroke-opacity="0.65" stroke-width="1.5"/>
      <text x="22" y="38" class="label">2. Output</text>
      <text x="578" y="38" text-anchor="end" class="sub">Image classification</text>
    </g>
    <g transform="translate(0, 156)">
      <rect x="0" y="0" width="600" height="62" rx="10" fill="#FD5FC2" fill-opacity="0.10" stroke="#FD5FC2" stroke-opacity="0.65" stroke-width="1.5"/>
      <text x="22" y="38" class="label">3. Metadata and behaviour</text>
      <text x="578" y="38" text-anchor="end" class="sub">Pattern signals</text>
    </g>
    <g transform="translate(0, 234)">
      <rect x="0" y="0" width="600" height="62" rx="10" fill="#FD5FC2" fill-opacity="0.10" stroke="#FD5FC2" stroke-opacity="0.65" stroke-width="1.5"/>
      <text x="22" y="38" class="label">4. Human reviewers</text>
      <text x="578" y="38" text-anchor="end" class="sub">Judgement and escalation</text>
    </g>
    <g transform="translate(0, 312)">
      <rect x="0" y="0" width="600" height="62" rx="10" fill="#FD5FC2" fill-opacity="0.10" stroke="#FD5FC2" stroke-opacity="0.65" stroke-width="1.5"/>
      <text x="22" y="38" class="label">5. Community reports</text>
      <text x="578" y="38" text-anchor="end" class="sub">Post-publication</text>
    </g>
  </g>
</svg>
