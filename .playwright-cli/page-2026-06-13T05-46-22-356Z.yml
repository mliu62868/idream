      - article [ref=e73]:
        - generic [ref=e74]:
          - paragraph [ref=e75]: Overview
          - heading "How moderation works" [level=1] [ref=e76]
        - paragraph [ref=e77]: Defense in depth across input, output, behaviour, labelers, and reports.
        - generic [ref=e78]:
          - paragraph [ref=e79]:
            - text: ourdream's content moderation is built as
            - link "defense in depth" [ref=e80] [cursor=pointer]:
              - /url: https://en.wikipedia.org/wiki/Defense_in_depth_(computing\
              - strong [ref=e81]: defense in depth
            - text: "): multiple independent layers stacked together, each tuned to catch a different category of content. Each layer specialises in a different class of signal, and the layers reinforce each other."
          - 'img "Defense in depth: five moderation layers stacked. Input, output, metadata and behaviour, human reviewers, community reports." [ref=e83]'
          - heading "The layers" [level=2] [ref=e84]
          - heading "1. Input" [level=3] [ref=e85]
          - paragraph [ref=e86]: Every prompt is classified before any model runs against it. Chat messages, image prompts, and character submissions pass through a set of classifiers covering content, behaviour, and metadata signals. Inputs that match the strictest signals are blocked before the model runs at all; other flagged inputs are routed to the next layer.
          - heading "2. Output" [level=3] [ref=e87]
          - paragraph [ref=e88]:
            - text: Generated images go through a separate set of classifiers that looks at the output independent of the prompt. This is an independent check on what the model actually produces, covering the categories that map to
            - link "Prohibited content" [ref=e89] [cursor=pointer]:
              - /url: /safety/policies/prohibited-content
            - text: . Outputs that fail are blocked from delivery and may trigger account level review.
          - heading "3. Metadata and behaviour" [level=3] [ref=e90]
          - paragraph [ref=e91]: The third layer reads patterns rather than content. It looks at signals across many actions by the same user, or across many users producing similar content. Examples include accounts that produce content the other layers reject at unusually high rates, and prompts that share structural features with previously-blocked ones.
          - paragraph [ref=e92]: Behaviour signals usually do not block content on their own. They raise the priority of human review.
          - heading "4. Human reviewers" [level=3] [ref=e93]
          - paragraph [ref=e94]: "Trained reviewers see what the classifiers flag. Reviewers can:"
          - list [ref=e95]:
            - listitem [ref=e96]: Approve content (release it from review).
            - listitem [ref=e97]: Reject it with a reason that maps to a specific policy.
            - listitem [ref=e98]: Escalate ambiguous cases to a senior reviewer or to the trust team.
            - listitem [ref=e99]: Flag patterns that the classifier layers should learn from; edge cases feed back into the rules and training data.
          - paragraph [ref=e100]: For public character submissions the review queue runs in the hundreds per day. For chat-generated content the volume is much higher; the classifier layers handle the bulk of it, and the cases that warrant a human reach a human.
          - heading "5. Community reports" [level=3] [ref=e101]
          - paragraph [ref=e102]:
            - text: The last layer is everyone using the product. Users can
            - link "report" [ref=e103] [cursor=pointer]:
              - /url: /safety/reporting/how-to-report
            - text: characters, images, videos, and scenarios. Reports trigger re-review against the
            - emphasis [ref=e104]: current
            - text: policy, which may be stricter than the one in force when the content was first generated.
          - paragraph [ref=e105]: The most severe categories (underage content) are reviewed first.
          - heading "Why this shape" [level=2] [ref=e106]
          - paragraph [ref=e107]: Each layer specialises. Classifiers handle volume at speed. Metadata signals catch behavioural patterns. Human reviewers handle ambiguity and judgement. The community surfaces what's actually playing out in practice. Together they cover more ground than any single layer could alone.
          - heading "The moderation team" [level=2] [ref=e108]
          - paragraph [ref=e109]: Reviewers are vetted ourdream staff and trusted long-term community contributors who have been onboarded into the moderation rota. They operate under written guidelines and undergo regular calibration with each other and with the trust team to keep judgement consistent.
          - paragraph [ref=e110]: Moderation decisions are made independent of growth and revenue metrics. The trust team owns the policy; product owns the product.
          - paragraph [ref=e111]: We care about moderator wellbeing because the work is hard, and do not tolerate abuse or harassment of our moderation team. The team also meets regularly to review edge cases and update the guidelines.
          - heading "What gets rejected most often" [level=2] [ref=e112]
          - paragraph [ref=e113]: "In the public-submission queue, in rough order of frequency:"
          - list [ref=e114]:
            - listitem [ref=e115]: Profile images with underage cues.
            - listitem [ref=e116]: Characters too close to existing IP.
            - listitem [ref=e117]: Scenarios that frame non-consent as desirable — whether the user is cast as perpetrator or the framing otherwise presents non-consent as the appeal.
            - listitem [ref=e118]: Names or descriptions matching the real-person blocklist.
          - paragraph [ref=e119]:
            - text: Each of these is described on
            - link "Prohibited content" [ref=e120] [cursor=pointer]:
              - /url: /safety/policies/prohibited-content
            - text: .
          - heading "What classifiers see vs what humans see" [level=2] [ref=e121]
          - paragraph [ref=e122]:
            - text: Automated classifiers process
            - strong [ref=e123]: all
            - text: content on the platform — including private chat messages and private generations — because they have to in order to enforce the policies above. Classifier processing happens in-line and no human reads the content as part of it.
          - paragraph [ref=e124]:
            - strong [ref=e125]: Human reviewers
            - text: only see content that has been (a) flagged by a classifier, (b) reported by a user, or (c) escalated as part of a trust-team investigation. They do not browse private chats. Account data (email, payment information, IP address) is gated behind trust- team access and is touched only when an investigation requires it.
          - heading "Appeals" [level=2] [ref=e126]
          - paragraph [ref=e127]:
            - text: If a creator believes a rejection or removal was applied incorrectly, the
            - link "Appeals" [ref=e128] [cursor=pointer]:
              - /url: /safety/moderation/appeals
            - text: process is the way to raise it. A different reviewer handles the appeal, with the original objection in mind. Appeals also feed back into the rules and training data, so the work creators put into making the case rarely goes nowhere.
        - paragraph [ref=e129]: Last modified on June 10, 2026
