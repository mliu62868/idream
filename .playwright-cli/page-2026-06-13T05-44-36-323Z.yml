        - paragraph [ref=e77]: How ourdream thinks about trust, moderation, and the limits of what we build.
        - generic [ref=e78]:
          - img "ourdream" [ref=e80]
          - paragraph [ref=e81]:
            - text: ourdream is a generative platform for AI characters, operated by
            - strong [ref=e82]: Dream Studio USA, Inc.
            - text: "(a Delaware corporation). Most of what people make on it is adult creative work: characters, scenarios, roleplay, the kind of thing that has lived in private notebooks and online forums for decades. The trust and safety work we do exists so that the platform stays a good home for that creative work, and so that the things that shouldn't be on it aren't."
          - paragraph [ref=e83]: Everything on ourdream is generated by AI. You are interacting with software, not a person. Characters do not exist outside the model and do not have feelings, memories, or independent existence between sessions.
          - paragraph [ref=e84]: "This site is the public record of how all of that happens: what is allowed, what is not, how moderation decisions get made, how to report a problem, and how to reach the team behind it. If something on the platform doesn't match what's described here, we want to know."
