name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: idream
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d idream"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_ENV: test
      DB_PROVIDER: postgresql
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/idream
      TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/idream_test
      REDIS_URL: redis://127.0.0.1:6379/15
      PGHOST: 127.0.0.1
      PGPORT: 5432
      PG_SUPER: postgres
      PGPASSWORD: postgres
      CHAT_SERVICE_PASSWORD: chat_service_change_me
      CHAT_REDIS_URL: redis://127.0.0.1:6379/14
      PW_BASE_URL: http://127.0.0.1:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Check packages
        run: bun run check

      - name: Test main
        run: bun run --filter @idream/main test

      - name: Check main coverage
        run: bun run --filter @idream/main coverage

      - name: Test chat
        run: bun run --filter @idream/chat test

      - name: Test generation workers
        run: bun run --filter @idream/gen test

      - name: Test shared contracts
        run: bun run --filter @idream/shared test

      - name: Prepare E2E database
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/idream_e2e
          REDIS_URL: redis://127.0.0.1:6379/13
          BULLMQ_PREFIX: idream:e2e
        run: |
          bun --cwd packages/main --eval '
            import pg from "pg";
            const client = new pg.Client({ connectionString: "postgresql://postgres:postgres@127.0.0.1:5432/postgres" });
            await client.connect();
            try {
              await client.query("CREATE DATABASE idream_e2e");
            } catch (error) {
              if (error?.code !== "42P04") throw error;
            } finally {
              await client.end();
            }
          '
          bun run --filter @idream/main db:push
          bun run --filter @idream/main db:seed

      - name: Start main-web for E2E
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/idream_e2e
          REDIS_URL: redis://127.0.0.1:6379/13
          BULLMQ_PREFIX: idream:e2e
          INTERNAL_TOKEN: development-internal-token
        run: nohup bun run --filter @idream/main dev -- --port 3000 > /tmp/idream-main-web.log 2>&1 &

      - name: Wait for main-web
        run: |
          for i in $(seq 1 60); do
            if curl -sSf "$PW_BASE_URL" >/dev/null 2>&1; then
              echo "main-web is up"
              exit 0
            fi
            sleep 2
          done
          echo "main-web did not become ready"
          exit 1

      - name: Run E2E
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/idream_e2e
          REDIS_URL: redis://127.0.0.1:6379/13
          BULLMQ_PREFIX: idream:e2e
          INTERNAL_TOKEN: development-internal-token
        run: bun run --filter @idream/main test:e2e

      - name: Upload Playwright traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: packages/main/test-results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload main-web log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: main-web-log
          path: /tmp/idream-main-web.log
          retention-days: 7
          if-no-files-found: ignore
